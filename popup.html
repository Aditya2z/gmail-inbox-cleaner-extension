<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gmail Mark All As Read</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3a;
      --accent:    #4f8ef7;
      --accent-glow: rgba(79, 142, 247, 0.35);
      --success:   #34d399;
      --warning:   #fbbf24;
      --danger:    #f87171;
      --text:      #e8eaf0;
      --text-muted:#6b7280;
      --font:      'Segoe UI', system-ui, sans-serif;
      --radius:    10px;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      width: 320px;
      min-height: 220px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow: hidden;
    }

    /* ── Header ───────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #4f8ef7, #7c3aed);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(79, 142, 247, 0.4);
    }

    .header-text h1 {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: var(--text);
    }

    .header-text p {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    /* ── Status Badge ─────────────────────────────────────────── */
    .status-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 44px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .status-dot.ready    { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .status-dot.running  {
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent-glow);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .status-dot.done     { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .status-dot.error    { background: var(--danger);  box-shadow: 0 0 6px var(--danger); }
    .status-dot.warn     { background: var(--warning); box-shadow: 0 0 6px var(--warning); }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.85); }
    }

    #statusText {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.4;
      flex: 1;
    }

    /* ── Progress ─────────────────────────────────────────────── */
    .progress-wrap {
      display: none;
      flex-direction: column;
      gap: 5px;
    }

    .progress-wrap.visible { display: flex; }

    .progress-track {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #7c3aed);
      border-radius: 2px;
      width: 0%;
      transition: width 0.4s ease;
      animation: shimmer 2s linear infinite;
      background-size: 200% 100%;
    }

    @keyframes shimmer {
      0%   { background-position: 200% center; }
      100% { background-position: -200% center; }
    }

    .progress-label {
      font-size: 11px;
      color: var(--text-muted);
      text-align: right;
    }

    /* ── Button ───────────────────────────────────────────────── */
    #markRead {
      width: 100%;
      padding: 11px 16px;
      background: linear-gradient(135deg, #4f8ef7 0%, #5b6cf8 100%);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 2px 14px rgba(79, 142, 247, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    #markRead:hover:not(:disabled) {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 4px 18px rgba(79, 142, 247, 0.55);
    }

    #markRead:active:not(:disabled) {
      transform: translateY(0);
    }

    #markRead:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
    }

    #markRead .btn-icon { font-size: 15px; }

    /* ── Footer Note ──────────────────────────────────────────── */
    .note {
      font-size: 10.5px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.5;
    }

    .note a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-icon">✉️</div>
    <div class="header-text">
      <h1>Mark All As Read</h1>
      <p>Gmail Inbox Cleaner</p>
    </div>
  </div>

  <!-- Status bar -->
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Open Gmail and click the button below.</span>
  </div>

  <!-- Progress indicator (shown while running) -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-label" id="progressLabel">Processing…</div>
  </div>

  <!-- Main action button -->
  <button id="markRead">
    <span class="btn-icon">✅</span>
    Mark All As Read
  </button>

  <!-- Footer -->
  <p class="note">Works across all inbox pages.<br/>Keep Gmail open while running.</p>

  <script src="popup.js"></script>
</body>
</html>
